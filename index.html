<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: white;
            font-size: 60px;
            text-align: center;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px white, 0 0 20px pink;
            }
            to {
                text-shadow: 0 0 20px white, 0 0 40px red;
            }
        }
    </style>
</head>
<body>
    <h1>I ❤️ Love You</h1>
</body>
</html>
